version: 2

sources:
  - name: plt_k1
    description: "Staging schema written by pipeline k1"
    database: "{{ var('plt_database') }}"
    schema: "{{ var('plt_sources')[0].schema }}"
    tables:
      - name: orders
        description: "Source orders table from k1 pipeline"

  - name: plt_k1_prime
    description: "Staging schema written by pipeline k1_prime"
    database: "{{ var('plt_database') }}"
    schema: "{{ var('plt_sources')[1].schema }}"
    tables:
      - name: orders
        description: "Source orders table from k1_prime pipeline"
